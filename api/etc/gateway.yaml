Name: gateway
Host: 0.0.0.0
Port: 8888

UserRpc: 
  Endpoints:
    - 127.0.0.1:8081
MessageRpc:
  Endpoints:
    - 127.0.0.1:8084
RelationRpc:
  Endpoints:
    - 127.0.0.1:8083
GroupRpc:
  Endpoints:
    - 127.0.0.1:8082

JWT:
  JwtSecret: ${JWT_SECRET:gochat-default-secret-key}
  ExpireHours: 72

Kafka:
  Brokers:
    - 127.0.0.1:9092
  Topic: message-topic

Redis:
  - Host: 127.0.0.1:6379
    Type: node

Etcd:
  Hosts:
    - 127.0.0.1:2379
  Key: gateway.api.router

Prometheus:
  Host: 0.0.0.0
  Port: 9091
  Path: /metrics

Telemetry:
  Name: gateway.api
  Endpoint: http://127.0.0.1:4317
  Sampler: 1.0
  Batcher: otlpgrpc
