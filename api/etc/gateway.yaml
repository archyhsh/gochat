Name: gateway
Host: 0.0.0.0
Port: 8888

UserRpc: 
  Endpoints:
    - 127.0.0.1:8081
MessageRpc:
  Endpoints:
    - 127.0.0.1:8084
RelationRpc:
  Endpoints:
    - 127.0.0.1:8083
GroupRpc:
  Endpoints:
    - 127.0.0.1:8082

JWT:
  JwtSecret: ${JWT_SECRET:gochat-default-secret-key}
  ExpireHours: 72

Kafka:
  Brokers:
    - 127.0.0.1:9092
  Topic: message-topic
