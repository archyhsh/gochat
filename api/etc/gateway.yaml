Name: gateway
Host: 0.0.0.0
Port: 8888

UserRpc: 
  Etcd:
    Hosts:
      - ${ETCD_HOST:127.0.0.1:2379}
    Key: user.rpc
MessageRpc:
  Etcd:
    Hosts:
      - ${ETCD_HOST:127.0.0.1:2379}
    Key: message.rpc
RelationRpc:
  Etcd:
    Hosts:
      - ${ETCD_HOST:127.0.0.1:2379}
    Key: relation.rpc
GroupRpc:
  Etcd:
    Hosts:
      - ${ETCD_HOST:127.0.0.1:2379}
    Key: group.rpc

JWT:
  JwtSecret: ${JWT_SECRET:gochat-default-secret-key}
  ExpireHours: 72

Kafka:
  Brokers:
    - ${KAFKA_BROKERS:127.0.0.1:9092}
  Topic: message-topic

Redis:
  - Host: ${REDIS_HOST:127.0.0.1:6379}
    Type: node

Etcd:
  Hosts:
    - ${ETCD_HOST:127.0.0.1:2379}
  Key: gateway.api.router

Prometheus:
  Host: 0.0.0.0
  Port: 9091
  Path: /metrics

Telemetry:
  Name: gateway.api
  Endpoint: ${TELEMETRY_ENDPOINT:http://127.0.0.1:4317}
  Sampler: 1.0
  Batcher: otlpgrpc
