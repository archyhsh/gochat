<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoChat - Modern IM</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <!-- Auth Page -->
    <div id="auth-page" class="auth-container">
        <div class="auth-box">
            <h2>GoChat v2.0.0</h2>
            <div class="auth-tabs">
                <div class="auth-tab active" data-type="login">Login</div>
                <div class="auth-tab" data-type="register">Register</div>
            </div>
            
            <div id="auth-error" class="error-msg hidden"></div>

            <div id="login-form">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="login-username" placeholder="Enter username">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="login-password" placeholder="Enter password">
                </div>
                <button id="login-btn" class="auth-btn">Sign In</button>
                <p style="text-align: center; margin-top: 16px; font-size: 13px;">
                    <a href="#" onclick="app.showForgot()">Forgot Password?</a>
                </p>
            </div>

            <div id="forgot-form" class="hidden">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="forgot-username" placeholder="Your username">
                </div>
                <div class="form-group">
                    <label>New Password</label>
                    <input type="password" id="forgot-new-password" placeholder="Enter new password">
                </div>
                <button id="reset-btn" class="auth-btn">Reset Password</button>
                <p style="text-align: center; margin-top: 16px; font-size: 13px;">
                    <a href="#" onclick="app.switchAuthTab('login')">Back to Login</a>
                </p>
            </div>

            <div id="register-form" class="hidden">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="reg-username" placeholder="Choose a username">
                </div>
                <div class="form-group">
                    <label>Nickname</label>
                    <input type="text" id="reg-nickname" placeholder="Your display name">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="reg-password" placeholder="Create a password">
                </div>
                <button id="register-btn" class="auth-btn">Create Account</button>
            </div>
        </div>
    </div>

    <!-- Main App Page -->
    <div id="app-page" class="app-container hidden">
        <!-- Sidebar -->
        <aside class="sidebar">
            <header class="sidebar-header">
                <div class="user-profile" onclick="app.showSettings()" style="cursor: pointer;">
                    <div id="my-avatar" class="avatar-circle">U</div>
                    <span id="my-name" class="user-name">User</span>
                </div>
                <button id="logout-btn" class="send-btn" title="Logout">Logout</button>
            </header>

            <nav class="sidebar-nav">
                <div class="nav-item active" data-view="chats">Chats</div>
                <div class="nav-item" data-view="friends">Friends <span id="request-badge" class="badge hidden">0</span></div>
                <div class="nav-item" data-view="groups">Groups</div>
                <button id="create-group-btn" class="send-btn" style="font-size: 14px; margin-left: auto;" title="Create Group">+</button>
            </nav>

            <div class="search-bar">
                <div class="search-input-wrapper">
                    <input type="text" id="global-search" placeholder="Search...">
                </div>
            </div>

            <div id="list-content" class="list-container">
                <!-- Items populated by JS -->
            </div>
        </aside>

        <!-- Chat Main Area -->
        <main class="chat-area">
            <!-- Welcome View -->
            <div id="welcome-view" class="empty-state">
                <div class="empty-icon">💬</div>
                <h3>Welcome to GoChat</h3>
                <p>Select a conversation to start messaging</p>
            </div>

            <!-- Active Chat View -->
            <div id="chat-view" class="hidden" style="height: 100%; display: flex; flex-direction: column;">
                <header class="chat-header">
                    <div class="chat-header-info">
                        <div class="avatar-circle">T</div>
                        <h4 id="active-chat-name">Conversation</h4>
                    </div>
                    <div id="group-actions" class="hidden">
                        <button id="invite-btn" class="action-btn-small" title="Invite">Invite</button>
                        <button id="members-btn" class="action-btn-small" title="Members">Members</button>
                        <button id="quit-group-btn" class="action-btn-small danger" title="Quit">Quit</button>
                        <button id="dismiss-group-btn" class="action-btn-small danger hidden" title="Dismiss">Dismiss</button>
                    </div>
                </header>

                <div id="member-list-panel" class="hidden" style="background: var(--bg-sidebar); border-bottom: 1px solid var(--border-color); max-height: 200px; overflow-y: auto;">
                    <!-- Members list -->
                </div>

                <div id="message-list" class="message-list">
                    <!-- Messages populated by JS -->
                </div>

                <footer class="chat-input-area">
                    <div class="chat-input-wrapper">
                        <input type="text" id="chat-input" placeholder="Type a message...">
                        <button id="send-msg-btn" class="send-btn">➤</button>
                    </div>
                </footer>
            </div>
        </main>
    </div>

    <!-- Modals -->
    <div id="settings-modal" class="auth-container hidden" style="position: fixed; top: 0; left: 0; width: 100%; z-index: 1000; background: rgba(0,0,0,0.5);">
        <div class="auth-box">
            <h3>Profile Settings</h3>
            <div class="form-group">
                <label>Nickname</label>
                <input type="text" id="set-nickname">
            </div>
            <div class="form-group">
                <label>Avatar URL</label>
                <input type="text" id="set-avatar">
            </div>
            <div class="form-group">
                <label>Phone</label>
                <input type="text" id="set-phone">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="set-email">
            </div>
            <div style="display: flex; gap: 12px;">
                <button onclick="app.handleUpdateProfile()" class="auth-btn">Save</button>
                <button onclick="document.getElementById('settings-modal').classList.add('hidden')" class="auth-btn" style="background: #94a3b8;">Cancel</button>
            </div>
        </div>
    </div>

    <div id="invite-modal" class="auth-container hidden" style="position: fixed; top: 0; left: 0; width: 100%; z-index: 1001; background: rgba(0,0,0,0.5);">
        <div class="auth-box">
            <h3>Invite Friends</h3>
            <div id="invite-list" style="max-height: 300px; overflow-y: auto; margin-bottom: 20px;">
                <!-- Friend items with checkbox -->
            </div>
            <div style="display: flex; gap: 12px;">
                <button onclick="app.submitInvite()" class="auth-btn">Invite Selected</button>
                <button onclick="document.getElementById('invite-modal').classList.add('hidden')" class="auth-btn" style="background: #94a3b8;">Cancel</button>
            </div>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
