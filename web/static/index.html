<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoChat - Modern IM</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <!-- Auth Page -->
    <div id="auth-page" class="auth-container">
        <div class="auth-box">
            <div class="auth-logo">
                <i class="fas fa-comments"></i>
                <h2>GoChat v2.5.2</h2>
            </div>
            
            <div class="auth-tabs">
                <div class="auth-tab active" data-type="login">Login</div>
                <div class="auth-tab" data-type="register">Register</div>
            </div>
            
            <div id="auth-error" class="error-msg hidden"></div>

            <!-- Login Form -->
            <div id="login-form">
                <div class="form-group">
                    <label><i class="fas fa-user"></i> Username</label>
                    <input type="text" id="login-username" placeholder="Enter username">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Password</label>
                    <input type="password" id="login-password" placeholder="Enter password">
                </div>
                <button id="login-btn" class="auth-btn">Sign In</button>
                <div class="auth-footer">
                    <a href="#" onclick="app.showForgot()">Forgot Password?</a>
                </div>
            </div>

            <!-- Register Form -->
            <div id="register-form" class="hidden">
                <div class="form-group">
                    <label><i class="fas fa-at"></i> Username</label>
                    <input type="text" id="reg-username" placeholder="Choose a username">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-signature"></i> Nickname</label>
                    <input type="text" id="reg-nickname" placeholder="Your display name">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-key"></i> Password</label>
                    <input type="password" id="reg-password" placeholder="Create a password">
                </div>
                <button id="register-btn" class="auth-btn">Create Account</button>
            </div>

            <!-- Forgot Password Form -->
            <div id="forgot-form" class="hidden">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="forgot-username" placeholder="Your username">
                </div>
                <div class="form-group">
                    <label>New Password</label>
                    <input type="password" id="forgot-new-password" placeholder="Enter new password">
                </div>
                <button id="reset-btn" class="auth-btn">Reset Password</button>
                <div class="auth-footer">
                    <a href="#" onclick="app.switchAuthTab('login')">Back to Login</a>
                </div>
            </div>
        </div>
    </div>

    <!-- Main App Page -->
    <div id="app-page" class="app-container hidden">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-top">
                <div class="user-card" onclick="app.showSettings()">
                    <div id="my-avatar" class="avatar-circle main-avatar">U</div>
                    <div class="user-card-info">
                        <span id="my-name" class="user-card-name">User</span>
                        <span class="user-status"><i class="fas fa-circle"></i> Online</span>
                    </div>
                    <button id="logout-btn" class="icon-btn" title="Logout"><i class="fas fa-sign-out-alt"></i></button>
                </div>

                <div class="search-section">
                    <div class="search-input-wrapper">
                        <i class="fas fa-search"></i>
                        <input type="text" id="global-search" placeholder="Search friends or groups...">
                    </div>
                </div>

                <nav class="sidebar-nav">
                    <div class="nav-item active" data-view="chats">
                        <i class="fas fa-comment-dots"></i>
                        <span>Chats</span>
                    </div>
                    <div class="nav-item" data-view="friends">
                        <i class="fas fa-user-friends"></i>
                        <span>Friends</span>
                        <span id="request-badge" class="badge hidden">0</span>
                    </div>
                    <div class="nav-item" data-view="groups">
                        <i class="fas fa-users"></i>
                        <span>Groups</span>
                    </div>
                    <button id="create-group-btn" class="add-circle-btn" title="Create Group"><i class="fas fa-plus"></i></button>
                </nav>
            </div>

            <div id="list-content" class="list-container">
                <!-- Items populated by JS -->
            </div>
        </aside>

        <!-- Chat Area -->
        <main class="chat-area">
            <!-- Welcome View -->
            <div id="welcome-view" class="empty-state">
                <div class="empty-icon"><i class="fas fa-rocket"></i></div>
                <h3>Welcome to GoChat</h3>
                <p>Pick a conversation or find new friends to start.</p>
            </div>

            <!-- Active Chat View -->
            <div id="chat-view" class="hidden">
                <header class="chat-header">
                    <div class="chat-header-info">
                        <div id="active-avatar" class="avatar-circle small">T</div>
                        <div class="header-text">
                            <h4 id="active-chat-name">Conversation</h4>
                            <span id="chat-subtext" class="subtext">Online</span>
                        </div>
                    </div>
                    <div id="group-actions" class="chat-actions hidden">
                        <button id="invite-btn" class="action-btn" title="Invite Friends"><i class="fas fa-user-plus"></i></button>
                        <button id="members-btn" class="action-btn" title="Group Members"><i class="fas fa-users-viewfinder"></i></button>
                        <button id="quit-group-btn" class="action-btn danger" title="Quit Group"><i class="fas fa-sign-out-alt"></i></button>
                        <button id="dismiss-group-btn" class="action-btn danger hidden" title="Dismiss Group"><i class="fas fa-trash-alt"></i></button>
                    </div>
                </header>

                <div id="member-list-panel" class="member-list-panel hidden">
                    <!-- Members list -->
                </div>

                <div id="message-list" class="message-list">
                    <!-- Messages populated by JS -->
                </div>

                <footer class="chat-input-area">
                    <div class="chat-input-wrapper">
                        <button class="icon-btn"><i class="far fa-smile"></i></button>
                        <input type="text" id="chat-input" placeholder="Type a message...">
                        <button id="send-msg-btn" class="send-btn"><i class="fas fa-paper-plane"></i></button>
                    </div>
                </footer>
            </div>
        </main>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="modal-overlay hidden">
        <div class="auth-box settings-box">
            <h3><i class="fas fa-cog"></i> User Settings</h3>
            <div class="form-group">
                <label>Nickname</label>
                <input type="text" id="set-nickname">
            </div>
            <div class="form-group">
                <label>Avatar URL</label>
                <input type="text" id="set-avatar">
            </div>
            <div class="form-group">
                <label>Phone</label>
                <input type="text" id="set-phone">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="set-email">
            </div>
            <div class="modal-footer">
                <button onclick="app.handleUpdateProfile()" class="auth-btn">Save Changes</button>
                <button onclick="document.getElementById('settings-modal').classList.add('hidden')" class="auth-btn secondary">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Invite Modal -->
    <div id="invite-modal" class="modal-overlay hidden">
        <div class="auth-box invite-box">
            <h3><i class="fas fa-user-plus"></i> Invite Friends</h3>
            <div id="invite-list" class="modal-list">
                <!-- Friend items with checkbox -->
            </div>
            <div class="modal-footer">
                <button onclick="app.submitInvite()" class="auth-btn">Invite Selected</button>
                <button onclick="document.getElementById('invite-modal').classList.add('hidden')" class="auth-btn secondary">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Member Settings Modal (For group nickname) -->
    <div id="member-settings-modal" class="modal-overlay hidden">
        <div class="auth-box">
            <h3>Group Member Settings</h3>
            <div class="form-group">
                <label>My Group Nickname</label>
                <input type="text" id="set-group-nickname" placeholder="Leave empty to use global name">
            </div>
            <div class="modal-footer">
                <button onclick="app.handleUpdateGroupNickname()" class="auth-btn">Save</button>
                <button onclick="document.getElementById('member-settings-modal').classList.add('hidden')" class="auth-btn secondary">Cancel</button>
            </div>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
