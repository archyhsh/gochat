Name: relation.rpc
ListenOn: 0.0.0.0:8083
Etcd:
  Hosts:
    - ${ETCD_HOST}
  Key: relation.rpc

DB:
  DataSource: ${DB_SOURCE}

Cache:
  - Host: ${REDIS_HOST}
    Pass: ""
    Type: node

Kafka:
  Brokers:
    - ${KAFKA_BROKERS}
  Topic: group-topic

UserRpc:
  Etcd:
    Hosts:
      - ${ETCD_HOST}
    Key: user.rpc
  NonBlock: true

Prometheus:
  Host: 0.0.0.0
  Port: 9091
  Path: /metrics

Telemetry:
  Name: relation.rpc
  Endpoint: ${TELEMETRY_ENDPOINT}
  Sampler: 1.0
  Batcher: otlpgrpc
