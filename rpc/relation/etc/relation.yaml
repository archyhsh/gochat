Name: relation.rpc
ListenOn: 0.0.0.0:8083
Etcd:
  Hosts:
    - 127.0.0.1:2379
  Key: relation.rpc

DB:
  DataSource: gochat:gochat123@tcp(127.0.0.1:3306)/gochat?charset=utf8mb4&parseTime=true&loc=UTC

Cache:
  - Host: 127.0.0.1:6379
    Pass: ""
    Type: node

Kafka:
  Brokers:
    - 127.0.0.1:9092
  Topic: group-topic

UserRpc:
  Endpoints:
    - 127.0.0.1:8081
  NonBlock: true

Prometheus:
  Host: 0.0.0.0
  Port: 9091
  Path: /metrics

Telemetry:
  Name: relation.rpc
  Endpoint: http://127.0.0.1:14268/api/traces
  Sampler: 1.0
  Batcher: jaeger
