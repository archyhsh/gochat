Name: relation.rpc
ListenOn: 0.0.0.0:8083
Etcd:
  Hosts:
    - ${ETCD_HOST:127.0.0.1:2379}
  Key: relation.rpc

DB:
  DataSource: ${DB_SOURCE:gochat:gochat123@tcp(127.0.0.1:3306)/gochat?charset=utf8mb4&parseTime=true&loc=UTC}

Cache:
  - Host: ${REDIS_HOST:127.0.0.1:6379}
    Pass: ""
    Type: node

Kafka:
  Brokers:
    - ${KAFKA_BROKERS:127.0.0.1:9092}
  Topic: group-topic

UserRpc:
  Etcd:
    Hosts:
      - ${ETCD_HOST:127.0.0.1:2379}
    Key: user.rpc
  NonBlock: true

Prometheus:
  Host: 0.0.0.0
  Port: 9091
  Path: /metrics

Telemetry:
  Name: relation.rpc
  Endpoint: ${TELEMETRY_ENDPOINT:http://127.0.0.1:4317}
  Sampler: 1.0
  Batcher: otlpgrpc
