Name: user.rpc
ListenOn: 0.0.0.0:8081
Etcd:
  Hosts:
  - ${ETCD_HOST}
  Key: user.rpc

DB:
  DataSource: ${DB_SOURCE}

Cache:
  - Host: ${REDIS_HOST}
    Pass: ""
    Type: node

Kafka:
  Brokers:
    - ${KAFKA_BROKERS}
  Topic: user-topic

JWT:
  AccessSecret: ${JWT_SECRET}
  AccessExpire: 604800

Prometheus:
  Host: 0.0.0.0
  Port: 9091
  Path: /metrics

Telemetry:
  Name: user.rpc
  Endpoint: ${TELEMETRY_ENDPOINT}
  Sampler: 1.0
  Batcher: otlpgrpc
