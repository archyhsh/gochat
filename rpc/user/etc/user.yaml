Name: user.rpc
ListenOn: 0.0.0.0:8081
Etcd:
  Hosts:
  - 127.0.0.1:2379
  Key: user.rpc

DB:
  DataSource: gochat:gochat123@tcp(127.0.0.1:3306)/gochat?charset=utf8mb4&parseTime=true&loc=UTC

Cache:
  - Host: 127.0.0.1:6379
    Pass: ""
    Type: node

Kafka:
  Brokers:
    - 127.0.0.1:9092
  Topics:
    Group: user-topic

JWT:
  AccessSecret: ${JWT_SECRET:gochat-default-secret-key}
  AccessExpire: 604800
