Name: message.rpc
ListenOn: 0.0.0.0:8084
Etcd:
  Hosts:
    - ${ETCD_HOST}
  Key: message.rpc

DB:
  DataSource: ${DB_SOURCE}

Cache:
  - Host: ${REDIS_HOST}
    Pass: ""
    Type: node

Kafka:
  Brokers:
    - ${KAFKA_BROKERS}
  Topics:
    Message: message-topic
    Group: group-topic
    User: user-topic
  GroupID: message-rpc-consumer-group

Prometheus:
  Host: 0.0.0.0
  Port: 9091
  Path: /metrics

Telemetry:
  Name: message.rpc
  Endpoint: ${TELEMETRY_ENDPOINT}
  Sampler: 1.0
  Batcher: otlpgrpc

UserRpc:
  Etcd:
    Hosts:
      - ${ETCD_HOST}
    Key: user.rpc
  NonBlock: true

GroupRpc:
  Etcd:
    Hosts:
      - ${ETCD_HOST}
    Key: group.rpc
  NonBlock: true

RelationRpc:
  Etcd:
    Hosts:
      - ${ETCD_HOST}
    Key: relation.rpc
  NonBlock: true
