Name: message.rpc
ListenOn: 0.0.0.0:8084
Etcd:
  Hosts:
    - ${ETCD_HOST:127.0.0.1:2379}
  Key: message.rpc

DB:
  DataSource: ${DB_SOURCE:gochat:gochat123@tcp(127.0.0.1:3306)/gochat?charset=utf8mb4&parseTime=true&loc=UTC}

Cache:
  - Host: ${REDIS_HOST:127.0.0.1:6379}
    Pass: ""
    Type: node

Kafka:
  Brokers:
    - ${KAFKA_BROKERS:127.0.0.1:9092}
  Topics:
    Message: message-topic
    Group: group-topic
    User: user-topic
  GroupID: message-rpc-consumer-group

Prometheus:
  Host: 0.0.0.0
  Port: 9091
  Path: /metrics

Telemetry:
  Name: message.rpc
  Endpoint: ${TELEMETRY_ENDPOINT:http://jaeger:4317}
  Sampler: 1.0
  Batcher: otlpgrpc

UserRpc:
  Etcd:
    Hosts:
      - ${ETCD_HOST:127.0.0.1:2379}
    Key: user.rpc
  NonBlock: true

GroupRpc:
  Etcd:
    Hosts:
      - ${ETCD_HOST:127.0.0.1:2379}
    Key: group.rpc
  NonBlock: true

RelationRpc:
  Etcd:
    Hosts:
      - ${ETCD_HOST:127.0.0.1:2379}
    Key: relation.rpc
  NonBlock: true
