Name: message.rpc
ListenOn: 0.0.0.0:8084
Etcd:
  Hosts:
    - 127.0.0.1:2379
  Key: message.rpc

DB:
  DataSource: gochat:gochat123@tcp(127.0.0.1:3306)/gochat?charset=utf8mb4&parseTime=true&loc=UTC

Cache:
  - Host: 127.0.0.1:6379
    Pass: ""
    Type: node

Kafka:
  Brokers:
    - 127.0.0.1:9092
  Topics:
    Message: message-topic
    Group: group-topic
    User: user-topic
  GroupID: message-rpc-consumer-group

Prometheus:
  Host: 0.0.0.0
  Port: 9091
  Path: /metrics

Telemetry:
  Name: message.rpc
  Endpoint: http://jaeger:14268/api/traces
  Sampler: 1.0
  Batcher: jaeger

UserRpc:
  Endpoints:
    - 127.0.0.1:8081
  NonBlock: true

GroupRpc:
  Endpoints:
    - 127.0.0.1:8082
  NonBlock: true

RelationRpc:
  Endpoints:
    - 127.0.0.1:8083
  NonBlock: true
