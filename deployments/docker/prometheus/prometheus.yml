global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'gateway'
    static_configs:
      - targets: ['gateway-1:9091', 'gateway-2:9091']

  - job_name: 'message-rpc'
    static_configs:
      - targets: ['message-rpc-1:9091', 'message-rpc-2:9091']

  - job_name: 'user-rpc'
    static_configs:
      - targets: ['user-rpc:9091']

  - job_name: 'group-rpc'
    static_configs:
      - targets: ['group-rpc:9091']

  - job_name: 'relation-rpc'
    static_configs:
      - targets: ['relation-rpc:9091']
