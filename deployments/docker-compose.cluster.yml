version: '3.8'

services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: gochat-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: gochat
      MYSQL_USER: gochat
      MYSQL_PASSWORD: gochat123
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/00-init.sql
      - ./mysql/user.sql:/docker-entrypoint-initdb.d/01-user.sql
      - ./mysql/group.sql:/docker-entrypoint-initdb.d/02-group.sql
      - ./mysql/relation.sql:/docker-entrypoint-initdb.d/03-relation.sql
      - ./mysql/message.sql:/docker-entrypoint-initdb.d/04-message.sql

  # Redis 缓存 (单点模拟，逻辑上支持集群)
  redis:
    image: redis:7.0-alpine
    container_name: gochat-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  # Etcd 服务发现
  etcd:
    image: bitnami/etcd:3.5
    container_name: gochat-etcd
    restart: unless-stopped
    ports:
      - "2379:2379"
    environment:
      - ALLOW_NONE_AUTHENTICATION=yes

  # Kafka 消息队列
  kafka:
    image: bitnami/kafka:3.4
    container_name: gochat-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      - KAFKA_CFG_NODE_ID=0
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_INTER_BROKER_LISTENER_NAME=PLAINTEXT
    healthcheck:
      test: ["CMD", "kafka-topics.sh", "--bootstrap-server", "127.0.0.1:9092", "--list"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      - etcd

  # Kafka Topic 初始化任务
  kafka-init:
    image: bitnami/kafka:3.4
    container_name: gochat-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./kafka/init-topics.sh:/app/init-topics.sh
    entrypoint: ["/bin/bash", "/app/init-topics.sh"]

  # --- Monitoring Stack ---

  # Prometheus 监控
  prometheus:
    image: prom/prometheus:latest
    container_name: gochat-prometheus
    restart: unless-stopped
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  # Grafana 可视化
  grafana:
    image: grafana/grafana:10.0.0
    container_name: gochat-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin

  # Jaeger 链路追踪
  jaeger:
    image: jaegertracing/all-in-one:1.47
    container_name: gochat-jaeger
    restart: unless-stopped
    ports:
      - "16686:16686" # UI
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP

  # --- Business Cluster Nodes ---

  # User RPC
  user-rpc:
    build:
      context: ..
      dockerfile: ./rpc/user/Dockerfile
    container_name: gochat-user-rpc
    restart: unless-stopped
    depends_on:
      - mysql
      - redis
      - etcd
    environment:
      - DB_SOURCE=gochat:gochat123@tcp(mysql:3306)/gochat_user?charset=utf8mb4&parseTime=true&loc=UTC
      - REDIS_HOST=redis:6379
      - ETCD_HOST=etcd:2379
      - TELEMETRY_ENDPOINT=http://jaeger:4317

  # Relation RPC
  relation-rpc:
    build:
      context: ..
      dockerfile: ./rpc/relation/Dockerfile
    container_name: gochat-relation-rpc
    restart: unless-stopped
    depends_on:
      - mysql
      - redis
      - etcd
    environment:
      - DB_SOURCE=gochat:gochat123@tcp(mysql:3306)/gochat_relation?charset=utf8mb4&parseTime=true&loc=UTC
      - REDIS_HOST=redis:6379
      - ETCD_HOST=etcd:2379
      - TELEMETRY_ENDPOINT=http://jaeger:4317

  # Group RPC
  group-rpc:
    build:
      context: ..
      dockerfile: ./rpc/group/Dockerfile
    container_name: gochat-group-rpc
    restart: unless-stopped
    depends_on:
      - mysql
      - redis
      - etcd
    environment:
      - DB_SOURCE=gochat:gochat123@tcp(mysql:3306)/gochat_group?charset=utf8mb4&parseTime=true&loc=UTC
      - REDIS_HOST=redis:6379
      - ETCD_HOST=etcd:2379
      - TELEMETRY_ENDPOINT=http://jaeger:4317

  # Message RPC Node 1
  message-rpc-1:
    build:
      context: ..
      dockerfile: ./rpc/message/Dockerfile
    container_name: gochat-message-rpc-1
    hostname: message-rpc-1
    restart: unless-stopped
    depends_on:
      - kafka
      - redis
      - etcd
    environment:
      - HOSTNAME=message-rpc-1
      - DB_SOURCE=gochat:gochat123@tcp(mysql:3306)/gochat_message?charset=utf8mb4&parseTime=true&loc=UTC
      - REDIS_HOST=redis:6379
      - ETCD_HOST=etcd:2379
      - KAFKA_BROKERS=kafka:9092
      - TELEMETRY_ENDPOINT=http://jaeger:4317

  # Message RPC Node 2
  message-rpc-2:
    build:
      context: ..
      dockerfile: ./rpc/message/Dockerfile
    container_name: gochat-message-rpc-2
    hostname: message-rpc-2
    restart: unless-stopped
    depends_on:
      - kafka
      - redis
      - etcd
    environment:
      - HOSTNAME=message-rpc-2
      - DB_SOURCE=gochat:gochat123@tcp(mysql:3306)/gochat_message?charset=utf8mb4&parseTime=true&loc=UTC
      - REDIS_HOST=redis:6379
      - ETCD_HOST=etcd:2379
      - KAFKA_BROKERS=kafka:9092
      - TELEMETRY_ENDPOINT=http://jaeger:4317

  # Gateway Node 1
  gateway-1:
    build:
      context: ..
      dockerfile: ./api/Dockerfile
    container_name: gochat-gateway-1
    hostname: gateway-1
    restart: unless-stopped
    ports:
      - "8881:8888"
    depends_on:
      - user-rpc
      - group-rpc
      - relation-rpc
      - message-rpc-1
      - kafka
      - redis
    environment:
      - HOSTNAME=gateway-1
      - REDIS_HOST=redis:6379
      - ETCD_HOST=etcd:2379
      - KAFKA_BROKERS=kafka:9092
      - TELEMETRY_ENDPOINT=http://jaeger:4317

  # Gateway Node 2
  gateway-2:
    build:
      context: ..
      dockerfile: ./api/Dockerfile
    container_name: gochat-gateway-2
    hostname: gateway-2
    restart: unless-stopped
    ports:
      - "8882:8888"
    depends_on:
      - user-rpc
      - group-rpc
      - relation-rpc
      - message-rpc-1
      - kafka
      - redis
    environment:
      - HOSTNAME=gateway-2
      - REDIS_HOST=redis:6379
      - ETCD_HOST=etcd:2379
      - KAFKA_BROKERS=kafka:9092
      - TELEMETRY_ENDPOINT=http://jaeger:4317

volumes:
  mysql_data:
  redis_data:
  etcd_data:
