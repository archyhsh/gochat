  #   container_name: gochat-gateway-1
  #   hostname: gateway-1
  #   restart: unless-stopped
  #   ports:
  #     - "8881:8888"
  #   depends_on:
  #     - user-rpc
  #     - group-rpc
  #     - relation-rpc
  #     - message-rpc-1
  #     - kafka
  #     - redis
  #   environment:
  #     - HOSTNAME=gateway-1
  #     - ETCD_HOST=etcd:2379
  #     - REDIS_HOST=redis:6379
  #     - KAFKA_BROKERS=kafka:9092
  #     - TELEMETRY_ENDPOINT=jaeger:4317
  #     - JWT_SECRET=gochat-default-secret-key

  gateway-1:
    build:
      context: ..
      dockerfile: ./api/Dockerfile
    container_name: gochat-gateway-1
    hostname: gateway-1
    restart: unless-stopped
    ports:
      - "8881:8888"
    depends_on:
      - user-rpc
      - group-rpc
      - relation-rpc
      - message-rpc-1
      - kafka
      - redis
    volumes:
      - ../web:/app/web # Hot Sync for development
    environment:
      - HOSTNAME=gateway-1
      - ETCD_HOST=etcd:2379
      - REDIS_HOST=redis:6379
      - KAFKA_BROKERS=kafka:9092
      - TELEMETRY_ENDPOINT=jaeger:4317
      - JWT_SECRET=gochat-default-secret-key

  gateway-2:
    build:
      context: ..
      dockerfile: ./api/Dockerfile
    container_name: gochat-gateway-2
    hostname: gateway-2
    restart: unless-stopped
    ports:
      - "8882:8888"
    depends_on:
      - user-rpc
      - group-rpc
      - relation-rpc
      - message-rpc-1
      - kafka
      - redis
    volumes:
      - ../web:/app/web # Hot Sync for development
    environment:
      - HOSTNAME=gateway-2
      - ETCD_HOST=etcd:2379
      - REDIS_HOST=redis:6379
      - KAFKA_BROKERS=kafka:9092
      - TELEMETRY_ENDPOINT=jaeger:4317
      - JWT_SECRET=gochat-default-secret-key

volumes:
  mysql_data:
  redis_data:
  etcd_data:
  zookeeper_data:
  zookeeper_log:
  grafana_data:
