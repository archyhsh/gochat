services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: gochat-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: gochat
      MYSQL_USER: gochat
      MYSQL_PASSWORD: gochat123
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/00-init.sql
      - ./docker/mysql/user.sql:/docker-entrypoint-initdb.d/01-user.sql
      - ./docker/mysql/group.sql:/docker-entrypoint-initdb.d/02-group.sql
      - ./docker/mysql/relation.sql:/docker-entrypoint-initdb.d/03-relation.sql
      - ./docker/mysql/message.sql:/docker-entrypoint-initdb.d/04-message.sql

  # Redis 缓存
  redis:
    image: redis:7.0-alpine
    container_name: gochat-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  # Zookeeper (Kafka 依赖)
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: gochat-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log

  # Kafka 消息队列
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: gochat-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "127.0.0.1:9092", "--list"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      - zookeeper

  # Etcd 服务发现
  etcd:
    image: quay.io/coreos/etcd:v3.5.15
    container_name: gochat-etcd
    restart: unless-stopped
    command:
      - /usr/local/bin/etcd
      - --name=etcd
      - --data-dir=/etcd-data
      - --listen-client-urls=http://0.0.0.0:2379
      - --advertise-client-urls=http://etcd:2379
      - --listen-peer-urls=http://0.0.0.0:2380
      - --initial-advertise-peer-urls=http://etcd:2380
      - --initial-cluster=etcd=http://etcd:2380
      - --initial-cluster-state=new
      - --initial-cluster-token=etcd-cluster-1
    ports:
      - "2379:2379"
      - "2380:2380"

  # Kafka Topic 初始化任务
  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    container_name: gochat-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./docker/kafka/init-topics.sh:/app/init-topics.sh
    entrypoint: ["/bin/bash", "/app/init-topics.sh"]

  # --- Monitoring Stack ---

  prometheus:
    image: prom/prometheus:latest
    container_name: gochat-prometheus
    restart: unless-stopped
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:10.0.0
    container_name: gochat-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana

  jaeger:
    image: jaegertracing/all-in-one:1.47
    container_name: gochat-jaeger
    restart: unless-stopped
    ports:
      - "16686:16686" # UI
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP

  # --- Business Cluster Nodes ---

  user-rpc:
    build:
      context: ..
      dockerfile: ./rpc/user/Dockerfile
    container_name: gochat-user-rpc
    restart: unless-stopped
    depends_on:
      - mysql
      - redis
      - etcd
    environment:
      - ETCD_HOST=etcd:2379
      - DB_SOURCE=gochat:gochat123@tcp(mysql:3306)/gochat_user?charset=utf8mb4&parseTime=true&loc=UTC
      - REDIS_HOST=redis:6379
      - KAFKA_BROKERS=kafka:9092
      - TELEMETRY_ENDPOINT=jaeger:4317
      - JWT_SECRET=gochat-default-secret-key

  relation-rpc:
    build:
      context: ..
      dockerfile: ./rpc/relation/Dockerfile
    container_name: gochat-relation-rpc
    restart: unless-stopped
    depends_on:
      - mysql
      - redis
      - etcd
    environment:
      - ETCD_HOST=etcd:2379
      - DB_SOURCE=gochat:gochat123@tcp(mysql:3306)/gochat_relation?charset=utf8mb4&parseTime=true&loc=UTC
      - REDIS_HOST=redis:6379
      - KAFKA_BROKERS=kafka:9092
      - TELEMETRY_ENDPOINT=jaeger:4317

  group-rpc:
    build:
      context: ..
      dockerfile: ./rpc/group/Dockerfile
    container_name: gochat-group-rpc
    restart: unless-stopped
    depends_on:
      - mysql
      - redis
      - etcd
    environment:
      - ETCD_HOST=etcd:2379
      - DB_SOURCE=gochat:gochat123@tcp(mysql:3306)/gochat_group?charset=utf8mb4&parseTime=true&loc=UTC
      - REDIS_HOST=redis:6379
      - KAFKA_BROKERS=kafka:9092
      - TELEMETRY_ENDPOINT=jaeger:4317

  message-rpc-1:
    build:
      context: ..
      dockerfile: ./rpc/message/Dockerfile
    container_name: gochat-message-rpc-1
    hostname: message-rpc-1
    restart: unless-stopped
    depends_on:
      - kafka
      - redis
      - etcd
    environment:
      - HOSTNAME=message-rpc-1
      - ETCD_HOST=etcd:2379
      - DB_SOURCE=gochat:gochat123@tcp(mysql:3306)/gochat_message?charset=utf8mb4&parseTime=true&loc=UTC
      - REDIS_HOST=redis:6379
      - KAFKA_BROKERS=kafka:9092
      - TELEMETRY_ENDPOINT=jaeger:4317

  message-rpc-2:
    build:
      context: ..
      dockerfile: ./rpc/message/Dockerfile
    container_name: gochat-message-rpc-2
    hostname: message-rpc-2
    restart: unless-stopped
    depends_on:
      - kafka
      - redis
      - etcd
    environment:
      - HOSTNAME=message-rpc-2
      - ETCD_HOST=etcd:2379
      - DB_SOURCE=gochat:gochat123@tcp(mysql:3306)/gochat_message?charset=utf8mb4&parseTime=true&loc=UTC
      - REDIS_HOST=redis:6379
      - KAFKA_BROKERS=kafka:9092
      - TELEMETRY_ENDPOINT=jaeger:4317

  # --- DEVELOPMENT NODES (Commented out production style, Added volume mounts) ---

  # gateway-1 (Original commented out)
